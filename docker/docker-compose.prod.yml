version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cvmp-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cvmp-prod

  redis:
    image: redis:7-alpine
    container_name: cvmp-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cvmp-prod

  backend:
    image: cvmp/backend:latest
    container_name: cvmp-backend-prod
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENVIRONMENT: production
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS}
      OPENSTACK_AUTH_URL: ${OPENSTACK_AUTH_URL}
      OPENSTACK_PROJECT_NAME: ${OPENSTACK_PROJECT_NAME}
      OPENSTACK_USERNAME: ${OPENSTACK_USERNAME}
      OPENSTACK_PASSWORD: ${OPENSTACK_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - cvmp-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: cvmp/worker:latest
    container_name: cvmp-worker-prod
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENVIRONMENT: production
      LOG_LEVEL: info
      OPENSTACK_AUTH_URL: ${OPENSTACK_AUTH_URL}
      OPENSTACK_PROJECT_NAME: ${OPENSTACK_PROJECT_NAME}
      OPENSTACK_USERNAME: ${OPENSTACK_USERNAME}
      OPENSTACK_PASSWORD: ${OPENSTACK_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: always
    networks:
      - cvmp-prod
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: cvmp-prometheus-prod
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always
    networks:
      - cvmp-prod

  grafana:
    image: grafana/grafana:latest
    container_name: cvmp-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: always
    networks:
      - cvmp-prod

  loki:
    image: grafana/loki:latest
    container_name: cvmp-loki-prod
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: always
    networks:
      - cvmp-prod

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  cvmp-prod:
    driver: bridge