apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: cvmp
data:
  backup.sh: |
    #!/bin/bash
    set -e
    
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_DIR=/backups
    BACKUP_FILE=$BACKUP_DIR/db_backup_$TIMESTAMP.sql.gz
    RETAIN_DAYS=30
    
    echo "Starting PostgreSQL backup..."
    
    # Create backup
    PGPASSWORD=$DB_PASSWORD pg_dump -h postgres -U $DB_USER -d $DB_NAME | gzip > $BACKUP_FILE
    
    if [ $? -eq 0 ]; then
      echo "Backup completed successfully: $BACKUP_FILE"
      ls -lh $BACKUP_FILE
    else
      echo "Backup failed"
      exit 1
    fi
    
    # Clean old backups
    echo "Cleaning old backups (older than $RETAIN_DAYS days)..."
    find $BACKUP_DIR -name "db_backup_*.sql.gz" -mtime +$RETAIN_DAYS -delete
    
    echo "Backup process completed"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: cvmp
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cvmp-sa
          containers:
          - name: postgres-backup
            image: postgres:15-alpine
            env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cvmp-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cvmp-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cvmp-config
                  key: DB_NAME
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              BACKUP_DIR=/backups
              BACKUP_FILE=$BACKUP_DIR/db_backup_$TIMESTAMP.sql.gz
              RETAIN_DAYS=30
              
              echo "Starting PostgreSQL backup..."
              
              mkdir -p $BACKUP_DIR
              PGPASSWORD=$DB_PASSWORD pg_dump -h postgres -U $DB_USER -d $DB_NAME | gzip > $BACKUP_FILE
              
              if [ $? -eq 0 ]; then
                echo "Backup completed: $BACKUP_FILE"
                ls -lh $BACKUP_FILE
              else
                echo "Backup failed"
                exit 1
              fi
              
              echo "Cleaning old backups..."
              find $BACKUP_DIR -name "db_backup_*.sql.gz" -mtime +$RETAIN_DAYS -delete
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: cvmp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard