apiVersion: v1
kind: ConfigMap
metadata:
  name: cvmp-config
  namespace: cvmp
data:
  ENVIRONMENT: production
  LOG_LEVEL: info
  DB_HOST: postgres.cvmp.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: cvmp_db
  REDIS_HOST: redis.cvmp.svc.cluster.local
  REDIS_PORT: "6379"
  OPENSTACK_PROJECT_DOMAIN_NAME: Default
  OPENSTACK_USER_DOMAIN_NAME: Default
  OPENSTACK_IDENTITY_API_VERSION: "3"
  CORS_ORIGINS: "https://cloud-vm.example.com"
  METRICS_PORT: "9090"
  LOKI_URL: "http://loki.cvmp.svc.cluster.local:3100"
  JAEGER_AGENT_HOST: jaeger-agent.cvmp.svc.cluster.local
  JAEGER_AGENT_PORT: "6831"