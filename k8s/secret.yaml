apiVersion: v1
kind: Secret
metadata:
  name: cvmp-secrets
  namespace: cvmp
type: Opaque
stringData:
  DB_USER: cvmp_user
  DB_PASSWORD: ChangeMeToSecurePassword
  REDIS_PASSWORD: ChangeMeToSecurePassword
  OPENSTACK_USERNAME: admin
  OPENSTACK_PASSWORD: ChangeMeToSecurePassword
  OPENSTACK_PROJECT_NAME: admin
  OPENSTACK_AUTH_URL: https://openstack.example.com:5000/v3
  JWT_SECRET: ChangeMeToSecureRandomString
  TLS_CERT: /etc/tls/certs/tls.crt
  TLS_KEY: /etc/tls/certs/tls.key
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: cvmp
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 