apiVersion: v1
kind: ServiceAccount
metadata:
  name: cvmp-sa
  namespace: cvmp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cvmp-role
  namespace: cvmp
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cvmp-rolebinding
  namespace: cvmp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cvmp-role
subjects:
- kind: ServiceAccount
  name: cvmp-sa
  namespace: cvmp